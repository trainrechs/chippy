name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build Library
      run: cargo build -p chippy-core --verbose
    - name: Run Desktop 
      run: cargo build -p chippy-desktop --verbose
